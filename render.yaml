services:
  # Backend Server
  - type: web
    name: clint-crm-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGODB_URI
        sync: false 
      - key: JWT_SECRET
        value: crm_secret_key_2024
      - key: PORT
        value: 5000

  # Frontend Web Dashboard
  - type: web
    name: clint-crm-dashboard
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: clint-crm-server
          type: web
          property: host
