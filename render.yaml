services:
  # Backend Server
  - type: web
    name: clint-crm-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGODB_URI
        sync: false 
      - key: JWT_SECRET
        value: crm_secret_key_2024
      - key: PORT
        value: 5000
