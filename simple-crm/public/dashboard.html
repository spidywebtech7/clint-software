<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-bg">
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>CallCRM</h2>
        </div>
        <ul class="nav-links">
            <li class="active"><a href="#"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
            <li><a href="#" id="logoutBtn"><i data-lucide="log-out"></i> Logout</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="topbar">
            <h1>Dashboard</h1>
            <button class="btn btn-primary" id="openAddModalBtn">
                <i data-lucide="plus"></i> Add Client
            </button>
        </header>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon clients"><i data-lucide="users"></i></div>
                <div class="stat-info">
                    <h3>Total Clients</h3>
                    <p id="totalClients">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pending"><i data-lucide="clock"></i></div>
                <div class="stat-info">
                    <h3>Pending Calls</h3>
                    <p id="pendingCalls">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon completed"><i data-lucide="check-circle"></i></div>
                <div class="stat-info">
                    <h3>Completed Calls</h3>
                    <p id="completedCalls">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon meetings"><i data-lucide="calendar"></i></div>
                <div class="stat-info">
                    <h3>Meetings</h3>
                    <p id="meetingsScheduled">0</p>
                </div>
            </div>
        </div>

        <!-- Client List Section -->
        <section class="client-section">
            <div class="section-header">
                <h2>Client List</h2>
                <div class="filters">
                    <input type="text" id="searchInput" placeholder="Search by name...">
                    <select id="statusFilter">
                        <option value="all">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
            </div>

            <div class="table-container">
                <table class="client-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Business Type</th>
                            <th>Status</th>
                            <th>Meeting Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="clientTableBody">
                        <!-- Rows will be injected here via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Add/Edit Client Modal -->
    <div id="clientModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Client</h3>
                <span class="close-btn">&times;</span>
            </div>
            <form id="clientForm">
                <input type="hidden" id="clientId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="clientName" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="clientEmail">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="clientPhone">
                </div>
                <div class="form-group">
                    <label>Business Type</label>
                    <input type="text" id="clientBusiness">
                </div>
                <div class="form-group">
                    <label>Meeting Date</label>
                    <input type="datetime-local" id="clientMeeting">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="clientNotes" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Save Client</button>
            </form>
        </div>
    </div>

    <!-- View Notes Modal -->
    <div id="notesModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Client Notes</h3>
                <span class="close-notes-btn">&times;</span>
            </div>
            <div class="modal-body" id="notesContent" style="padding: 1rem 0; white-space: pre-wrap;">
                <!-- Notes will be injected here -->
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
